<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendations</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 5px; background: #f0f0f0; margin: 5px 0; border-radius: 5px; }
        .matched { font-weight: bold; color: #0066cc; }
    </style>
</head>
<body>
    <h1>Recommendations</h1>
    <p>You searched for: <strong>{{ query }}</strong></p>
    <p>Matched: <span class="matched">{{ matched }}</span></p>
    
    <h2>Other titles you might like:</h2>
    {% if recommendations %}
        <ul>
        {% for rec in recommendations %}
            <li>{{ rec }}</li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No other recommendations in this cluster.</p>
    {% endif %}
    
    <p><a href="/">← Search again</a></p>
</body>
</html>
